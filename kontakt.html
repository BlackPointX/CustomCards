<!-- kontakt.html -->
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt – Custom Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#394D5A',
            secondary: '#56A0EA',
            accent: '#CCCC80',
            background: '#1F2933',
            card: '#2D3741'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-background text-white font-sans">

  <!-- HEADER -->
  <header class="bg-primary text-white">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between">
      <h1 class="text-xl font-heading font-bold w-full sm:w-auto mb-2 sm:mb-0 text-center sm:text-left">Custom Cards</h1>
      <nav class="flex flex-wrap justify-center sm:justify-end gap-2 text-sm w-full sm:w-auto">
        <a href="index.html" class="hover:text-accent">Strona główna</a>
        <a href="sklep.html" class="hover:text-accent">Sklep</a>
        <a href="onas.html" class="hover:text-accent">O nas</a>
        <a href="kontakt.html" class="text-accent font-bold underline underline-offset-4">Kontakt</a>
        <a href="koszyk.html" class="bg-secondary text-white px-3 py-1 rounded hover:bg-blue-500">🛒 Koszyk</a>
      </nav>
    </div>
  </header>

  <!-- FORMULARZ KONTAKTOWY -->
  <section class="max-w-2xl mx-auto px-4 py-16">
    <h2 class="text-3xl sm:text-4xl font-heading font-bold text-accent mb-8 text-center">Skontaktuj się z nami</h2>

    <form action="#" method="POST" class="space-y-6">
      <div>
        <label for="name" class="block mb-1 font-semibold">Imię i nazwisko</label>
        <input type="text" id="name" name="name" required class="w-full p-3 rounded bg-card text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-secondary" />
      </div>
      <div>
        <label for="email" class="block mb-1 font-semibold">Adres e-mail</label>
        <input type="email" id="email" name="email" required class="w-full p-3 rounded bg-card text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-secondary" />
      </div>
      <div>
        <label for="subject" class="block mb-1 font-semibold">Temat</label>
        <input type="text" id="subject" name="subject" class="w-full p-3 rounded bg-card text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-secondary" />
      </div>
      <div>
        <label for="message" class="block mb-1 font-semibold">Wiadomość</label>
        <textarea id="message" name="message" rows="5" required class="w-full p-3 rounded bg-card text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-secondary"></textarea>
      </div>
      <div class="text-center">
        <button type="submit" class="bg-secondary text-white font-bold px-6 py-3 rounded hover:bg-blue-500 transition">Wyślij wiadomość</button>
      </div>
    </form>
  </section>

  <!-- CTA MAIL -->
  <section class="bg-gray-800 py-6 text-center text-sm text-gray-400">
    Możesz też napisać bezpośrednio na: <a href="mailto:kontakt@customcards.pl" class="text-accent hover:underline">kontakt@customcards.pl</a>
  </section>

  <!-- STOPKA -->
  <footer class="bg-primary text-white mt-12">
    <div class="max-w-6xl mx-auto px-4 py-8 text-sm text-center">
      &copy; 2025 Custom Cards. Wszystkie prawa zastrzeżone.
    </div>
  </footer>

</body>
</html>
